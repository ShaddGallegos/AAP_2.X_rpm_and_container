---
# Orchestrator playbook: 2.4 -> 2.5 -> 2.6
# Run from the project root:
#   ansible-playbook playbooks/migrate_24_25_26.yml

- name: Step 00a - Prompt for credentials
  import_playbook: 01_prompt_credentials.yml

- name: Step 00b - Fetch Controller API token (optional)
  import_playbook: 02_fetch_controller_token.yml

- name: Step 00 - Platform detection and controller prep
  import_playbook: 00_platform_setup.yml

- name: Step 0 - Pre-migration health check (2.4)
  import_playbook: 05_pre_migration_healthcheck.yml

- name: Step 1 - Snapshot PRE 2.4
  import_playbook: 10_snapshot_24.yml

- name: Step 2 - Backup + sosreport on 2.4
  import_playbook: 20_backup_24.yml

- name: Step 2b - Report (2.4 baseline)
  import_playbook: 25_report_24.yml

- name: Step 3 - Upgrade to 2.5
  import_playbook: 30_upgrade_24_to_25.yml

- name: Step 3b - Functional smoke test (2.5)
  import_playbook: 45_smoke_test_25.yml

- name: Step 4 - Snapshot PRE 2.6
  import_playbook: 50_snapshot_25.yml

- name: Step 5 - Backup + sosreport on 2.5
  import_playbook: 60_backup_25.yml

- name: Step 5b - Report (2.5 pre-2.6)
  import_playbook: 65_report_25.yml

- name: Step 6 - Upgrade to 2.6
  import_playbook: 70_upgrade_25_to_26.yml

- name: Step 6b - Functional smoke test (2.6)
  import_playbook: 82_smoke_test_26.yml

- name: Step 7 - Backup + sosreport on 2.6
  import_playbook: 85_backup_26.yml

- name: Step 8 - Final report
  import_playbook: 90_final_report.yml
