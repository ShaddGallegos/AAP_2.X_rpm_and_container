---
- name: Validate installer inputs
  ansible.builtin.assert:
    that:
      - aap_installer_dir | length > 0
    fail_msg: "aap_installer_dir must be set"

- name: Resolve installer command path
  ansible.builtin.set_fact:
    _aap_installer_command: "{{ aap_installer_command | default('') | trim if (aap_installer_command is defined) else '' }}"

- name: Default installer command path to setup.sh
  ansible.builtin.set_fact:
    _aap_installer_command: "{{ aap_installer_dir }}/setup.sh"
  when: _aap_installer_command | length == 0

- name: Check installer command exists
  ansible.builtin.stat:
    path: "{{ _aap_installer_command }}"
  register: _setup_sh

- name: Fail if installer command missing
  ansible.builtin.fail:
    msg: "Installer command not found at {{ _aap_installer_command }}"
  when: not _setup_sh.stat.exists

- name: Define stage marker path
  ansible.builtin.set_fact:
    _stage_marker: "{{ stage_marker_dir }}/aap_migration_{{ stage_label }}.done"

- name: Check if stage already completed
  ansible.builtin.stat:
    path: "{{ _stage_marker }}"
  register: _stage_done

- name: Run installer for stage (this can take a while)
  ansible.builtin.command: >-
    {{ _aap_installer_command }}
    -i {{ aap_installer_dir }}/{{ aap_installer_inventory }}
    {{ aap_setup_extra_args }}
  register: _setup_run
  changed_when: true
  when: not _stage_done.stat.exists

- name: Create stage marker
  ansible.builtin.file:
    path: "{{ _stage_marker }}"
    state: touch
    mode: '0600'
  when: not _stage_done.stat.exists

- name: Expose installer output
  ansible.builtin.set_fact:
    aap_setup_stdout: "{{ _setup_run.stdout | default('') }}"
    aap_setup_stderr: "{{ _setup_run.stderr | default('') }}"
