---
# Where this project lives; default: parent of playbooks/
project_root: "{{ playbook_dir | dirname }}"

# RHEL controller bootstrap flags
enable_epel: true
enable_crb: true

# Use user-level pip install by default (no venv)
pip_extra_args: "--user"

# Ansible Galaxy config: render ansible.cfg from template if token is provided
redhat_automation_hub_token: "{{ lookup('env', 'REDHAT_AH_TOKEN') | default('', true) }}"

# Base packages (RHEL 9/10)
base_os_packages:
  - python3
  - python3-pip
  - python3-venv
  - python3-devel
  - git
  - openssh-clients
  - sshpass
  - tar
  - gzip
  - ca-certificates
  - gcc
  - make
  - libffi-devel
  - openssl-devel

# Base Python packages
base_pip_packages:
  - "ansible-core>=2.15,<2.18"

# Base collections (always useful)
base_collections:
  - community.general
  - ansible.posix

# Platform-specific extras
platform_os_packages:
  vmware: []
  nutanix: []
  libvirt: []
  baremetal: []
  aws: []
  gcp: []
  azure: []

platform_pip_packages:
  vmware:
    - "pyvmomi>=8.0.2"
  nutanix: []
  libvirt: []
  baremetal: []
  aws:
    - "boto3>=1.28"
    - "botocore>=1.31"
  gcp:
    - "google-auth>=2.23"
    - "google-auth-httplib2>=0.2"
    - "google-api-python-client>=2.111"
    - "google-cloud-storage>=2.12"
    - "google-cloud-compute>=1.17"
  azure:
    - "azure-identity>=1.15"
    - "azure-mgmt-resource>=23.0"
    - "azure-mgmt-network>=25.0"
    - "azure-mgmt-compute>=30.0"
    - "azure-mgmt-storage>=21.1"
    - "msrestazure>=0.6.4"

platform_collections:
  vmware:
    - community.vmware
  nutanix: []         # add collections if needed later
  libvirt: []         # libvirt usage usually via shell/virt tooling
  baremetal: []
  aws:
    - amazon.aws
  gcp:
    - google.cloud
  azure:
    - azure.azcollection