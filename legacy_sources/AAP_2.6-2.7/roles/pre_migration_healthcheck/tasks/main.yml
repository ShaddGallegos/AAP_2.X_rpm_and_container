---
- name: Ensure local report dir exists
  ansible.builtin.file:
    path: "{{ artifact_dir_local }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true

- name: Check PostgreSQL client version
  ansible.builtin.command: psql --version
  register: pre_mig_psql_version
  changed_when: false
  failed_when: false

- name: Identify legacy Jinja2 syntax (|changed)
  ansible.builtin.shell: |
    set -o pipefail
    if [ -d "{{ project_path }}" ]; then
      grep -R "\|changed" "{{ project_path }}" 2>/dev/null | grep -v "Binary file" || true
    else
      echo "PROJECT_PATH_NOT_FOUND: {{ project_path }}"
    fi
  args:
    executable: /bin/bash
  register: _jinja_changed
  changed_when: false
  failed_when: false

- name: Identify legacy Jinja2 syntax (|failed)
  ansible.builtin.shell: |
    set -o pipefail
    if [ -d "{{ project_path }}" ]; then
      grep -R "\|failed" "{{ project_path }}" 2>/dev/null | grep -v "Binary file" || true
    else
      echo "PROJECT_PATH_NOT_FOUND: {{ project_path }}"
    fi
  args:
    executable: /bin/bash
  register: _jinja_failed
  changed_when: false
  failed_when: false

- name: Collect podman images (if available)
  when: check_podman_images | bool
  ansible.builtin.command: podman images
  register: podman_images
  changed_when: false
  failed_when: false

- name: Aggregate scan hits on control node
  ansible.builtin.set_fact:
    jinja_changed_hits: "{{ (_jinja_changed.stdout_lines | default([])) | reject('equalto','') | list }}"
    jinja_failed_hits: "{{ (_jinja_failed.stdout_lines | default([])) | reject('equalto','') | list }}"
  delegate_to: localhost
  run_once: true

- name: Render pre-migration report
  ansible.builtin.template:
    src: pre_migration_report.md.j2
    dest: "{{ artifact_dir_local }}/{{ lookup('pipe','date +%Y%m%d_%H%M%S') }}_pre_migration_healthcheck.md"
  delegate_to: localhost
  run_once: true

- name: Pre-flight report summary
  ansible.builtin.debug:
    msg:
      - "--- PRE-FLIGHT REPORT SUMMARY ---"
      - "psql: {{ pre_mig_psql_version.stdout | default('n/a') }}"
      - "Legacy '|changed' hits: {{ (_jinja_changed.stdout_lines | default([])) | length }}"
      - "Legacy '|failed' hits: {{ (_jinja_failed.stdout_lines | default([])) | length }}"
      - "Next: remediate legacy syntax and confirm PostgreSQL 15 path for AAP 2.6"
