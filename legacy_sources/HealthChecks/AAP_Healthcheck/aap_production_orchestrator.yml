---
- name: Enterprise Ansible Automation Platform Cluster Health Audit & Optimization
  hosts: aap_nodes
  become: true
  gather_facts: true

  vars_files:
    - vars.yml

  vars:
    aap_ports:
      - port: 80
        proto: 'tcp'
        desc: 'Platform HTTP Gateway / Redirect'
      - port: 443
        proto: 'tcp'
        desc: 'Platform HTTPS Gateway (Controller/Hub/EDA Unified Console)'
      - port: 5432
        proto: 'tcp'
        desc: 'PostgreSQL Datastore Layer Socket'
      - port: 6379
        proto: 'tcp'
        desc: 'Redis Cache Internal Messaging Bus'
      - port: 7899
        proto: 'tcp'
        desc: 'Receptor Mesh Inter-Node Link Socket'

  pre_tasks:
    - name: Preflight - ensure required RHEL binaries exist
      when: ansible_os_family == 'RedHat'
      tags: [preflight]
      block:
        - name: Check for rpm binary
          ansible.builtin.stat:
            path: /bin/rpm
          register: rpm_stat

        - name: Check for dnf binary
          ansible.builtin.stat:
            path: /usr/bin/dnf
          register: dnf_stat

        - name: Fail if RHEL binaries missing
          ansible.builtin.fail:
            msg: "Required system binary missing: rpm or dnf"
          when: not (rpm_stat.stat.exists and dnf_stat.stat.exists)

  tasks:
    ## --------------------------------------------------------
    ## INTERACTIVE HELP, USAGE & DOCUMENTATION MENU
    ## --------------------------------------------------------
    - name: Display AAP Automation Run Manual & Index Directory
      when: show_help | default(false) | bool
      tags: [help]
      block:
        - name: Print Usage Matrix
          ansible.builtin.debug:
            msg:
              - "=================================================================="
              - "  AAP AUDIT & PERFORMANCE TUNING SUITE - EXECUTION MANUAL         "
              - "=================================================================="
              - "DESCRIPTION:"
              - "  Automates infrastructure verification loops across AAP 2.4 - 2.7 clusters."
              - "  Analyzes service health, logs vulnerabilities, detects unconfigured features,"
              - "  and applies custom kernel, memory, and open file limits optimizations."
              - ""
              - "OPERATIONAL EXECUTION COMMANDS:"
              - "  1. View this help manual:"
              - "     ansible-playbook aap_production_orchestrator.yml -e show_help=true"
              - "  2. Run safe check mode simulation (Audit mode, no changes executed):"
              - "     ansible-playbook -i inventory aap_production_orchestrator.yml --check"
              - "  3. Apply modifications and trigger live system optimizations:"
              - "     ansible-playbook -i inventory aap_production_orchestrator.yml"
              - "=================================================================="
              - "  RED HAT OFFICIAL AAP PERFORMANCE COMPLIANCE PORTAL              "
              - "=================================================================="
              - "  Primary Portal Hub: https://access.redhat.com/products/ansible-automation-platform"
              - "  - Performance Sizing Rules: https://docs.redhat.com/en/doc/rh-aap/perf-tuning"
              - "  - System Hardening & Compliance Mandates: https://docs.redhat.com/en/doc/rh-aap/hardening"
              - "=================================================================="

        - name: Exit lifecycle run cleanly after displaying documentation
          ansible.builtin.meta: end_play

    ## --------------------------------------------------------
    ## 1. DYNAMIC DEPENDENCY RESOLUTION
    ## --------------------------------------------------------
    - name: Bootstrap - Deploy essential management engines and libraries
      ansible.builtin.package:
        name: [chrony, curl, util-linux, tuned, subscription-manager, python3-requests]
        state: present
      tags: [bootstrap]

    ## --------------------------------------------------------
    ## 2. APP VERSION ENGINE INTERROGATION
    ## --------------------------------------------------------
    - name: Engine Discovery - gather package facts for AAP components
      ansible.builtin.package_facts:
        manager: auto
      register: pkg_facts
      ignore_errors: true
      tags: [discovery]

    - name: Set controller, hub, eda facts
      ansible.builtin.set_fact:
        controller_rpm_check: >-
          {{ (ansible_facts.packages['automation-controller'] | default([]) | first).version
             | default('Not Present / Isolated Node Type') }}
        hub_rpm_check: >-
          {{ (ansible_facts.packages['automation-hub'] | default([]) | first).version
             | default('Not Present / Isolated Node Type') }}
        eda_rpm_check: >-
          {{ (ansible_facts.packages['eda-controller'] | default([]) | first).version
             | default('Not Present / Isolated Node Type') }}
      tags: [discovery]

    ## --------------------------------------------------------
    ## 3. SECURITY CONNECTIVITY & ADVISORY SCANNING
    ## --------------------------------------------------------
    - name: Security Audit - Check insights-client status
      ansible.builtin.command: insights-client --status
      register: insights_status_cmd
      changed_when: false
      failed_when: false
      tags: [security]

    - name: Security Audit - Check rhc connector status
      ansible.builtin.command: rhc status
      register: rhc_status_cmd
      changed_when: false
      failed_when: false
      tags: [security]

    - name: Security Audit - Extract system vulnerabilities summary
      ansible.builtin.command: dnf updateinfo summary --quiet
      register: dnf_security_summary
      changed_when: false
      failed_when: false
      tags: [security]

    - name: Security Audit - List CVEs via dnf
      ansible.builtin.command: dnf updateinfo list cves --quiet
      register: dnf_cve_list
      changed_when: false
      failed_when: false
      tags: [security]

    ## --------------------------------------------------------
    ## 4. BASE KERNEL, PORT, & TIME SYNCHRONIZATION INSPECTION
    ## --------------------------------------------------------
    - name: Infrastructure Audit - Map file systems configured as read-only
      ansible.builtin.shell: |
        awk '$4 ~ /^ro/ {print $2}' /proc/mounts
      register: ro_mounts
      changed_when: false
      tags: [audit]

    - name: Assert - Validate critical execution storage path boundaries
      ansible.builtin.assert:
        that:
          - (item.size_available / item.size_total) > 0.15
        fail_msg: "Critically low disk safety overhead mapped on partition: {{ item.mount }}!"
      loop: "{{ ansible_facts.mounts }}"
      when: item.mount in ['/var', '/var/lib/awx', '/var/lib/pulp', '/var/lib/pgsql', '/']
      tags: [audit]

    - name: Infrastructure Audit - Verify socket mappings for core components
      ansible.builtin.wait_for:
        port: "{{ item.port }}"
        state: started
        timeout: 3
      loop: "{{ aap_ports }}"
      register: wait_for_ports
      failed_when: false
      tags: [audit]

    - name: Infrastructure Audit - Verify Chrony clock tracking state
      ansible.builtin.command: chronyc tracking
      register: chrony_check
      failed_when: false
      changed_when: false
      tags: [audit]

    ## --------------------------------------------------------
    ## 5. PERFORMANCE ENFORCEMENT & PLATFORM ENGINE TUNING
    ## --------------------------------------------------------
    - name: Optimization [1/4] - Enforce optimized file limits definitions for running system profiles
      ansible.builtin.copy:
        dest: /etc/security/limits.d/99-ansible-platform.conf
        content: |
          awx      soft    nofile    {{ max_open_files }}
          awx      hard    nofile    {{ max_open_files }}
          awx      soft    nproc     {{ max_process_limits }}
          awx      hard    nproc     {{ max_process_limits }}
          receptor soft    nofile    {{ max_open_files }}
          receptor hard    nofile    {{ max_open_files }}
        owner: root
        group: root
        mode: '0640'
        backup: true
      register: limits_tuning_result
      when: tune_system_limits
      tags: [tuning]

    - name: Optimization [2/4] - Establish systemd background engine to drop Transparent Hugepages (THP)
      ansible.builtin.template:
        src: templates/disable-thp.service.j2
        dest: /etc/systemd/system/disable-thp.service
        owner: root
        group: root
        mode: '0644'
        backup: true
      register: thp_manifest
      when: disable_transparent_hugepages
      tags: [tuning]

    - name: Optimization [2/4] - Activate Transparent Hugepage tuning engine wrapper
      ansible.builtin.systemd:
        name: disable-thp
        enabled: true
        state: started
        daemon_reload: true
      register: thp_activation
      when: disable_transparent_hugepages
      tags: [tuning]

    - name: Optimization [3/4] - Inject kernel sysctl architecture modifications
      ansible.posix.sysctl:
        name: vm.overcommit_memory
        value: "{{ sysctl_memory_overcommit | string }}"
        state: present
        reload: true
      register: sysctl_tuning_result
      when: apply_kernel_memory_tweaks
      tags: [tuning]

    - name: Optimization [4/4] - Enforce localized tuned performance tracking profile
      ansible.builtin.command:
        cmd: tuned-adm profile {{ system_tuned_profile }}
      register: tuned_result
      when: apply_tuned_profile
      changed_when: tuned_result.rc == 0
      tags: [tuning]

    ## --------------------------------------------------------
    ## 6. LIVE DISK WRITE SPEEDS PERFORMANCE TEST
    ## --------------------------------------------------------
    - name: Infrastructure Testing - Run safe direct-flag execution datastore disk benchmark
      ansible.builtin.command:
        cmd: dd if=/dev/zero of=/var/lib/io_perf_test_marker_aap bs=1M count=100 oflag=direct
      register: raw_io_benchmark
      failed_when: false
      changed_when: false
      tags: [benchmark]

    - name: Infrastructure Testing - Clean up localized benchmark files
      ansible.builtin.file:
        path: /var/lib/io_perf_test_marker_aap
        state: absent
      tags: [benchmark]

    - name: Consolidate report variables
      ansible.builtin.set_fact:
        controller_version: "{{ controller_rpm_check }}"
        hub_version: "{{ hub_rpm_check }}"
        eda_version: "{{ eda_rpm_check }}"
        insights_status_text: >-
          {{ 'Active / Synchronized' if
             (insights_status_cmd is defined and
              (insights_status_cmd.rc == 0 or
               'Registered' in (insights_status_cmd.stdout | default(''))))
             else 'Unregistered / Inactive' }}
        rhc_status_text: >-
          {{ 'Active / Online' if
             (rhc_status_cmd is defined and
              rhc_status_cmd.rc == 0)
             else 'Disconnected / Inactive' }}
        dnf_security_summary_text: >-
          {{ dnf_security_summary.stdout | default('No outstanding dnf advisories') }}
        dnf_cve_text: >-
          {{ (dnf_cve_list.stdout_lines | default([]))[:12] | join('\n') }}
        file_limits_status: >-
          {{ 'Enforced File Limits Limits Map' if
             (limits_tuning_result is defined and
              not limits_tuning_result.skipped)
             else 'Skipped' }}
        thp_status: >-
          {{ 'Disabled Performance-Degrading THP' if
             (thp_activation is defined and
              not thp_activation.skipped and
              thp_activation.changed)
             else 'No Changes Needed' }}
        sysctl_status: >-
          {{ 'vm.overcommit_memory applied' if
             (sysctl_tuning_result is defined and
              not sysctl_tuning_result.skipped and
              sysctl_tuning_result.changed)
             else 'No Changes Needed' }}
        tuned_status: >-
          {{ 'Profile Enforced: ' + system_tuned_profile if
             (tuned_result is defined and
              not tuned_result.skipped)
             else 'Skipped' }}
        chrony_text: >-
          {{ 'PASSED / Sync Active' if
             (chrony_check is defined and chrony_check.rc == 0)
             else 'CRITICAL DRIFT ENCOUNTERED' }}
        ro_mounts_text: >-
          {{ 'PASSED / Clean Mount states' if
             (ro_mounts is defined and ro_mounts.stdout == '')
             else 'CRITICAL READ-ONLY FS ERROR DETECTED' }}
        raw_io_text: >-
          {{ raw_io_benchmark.stderr | default('Benchmark execution failed') }}
      tags: [report]

    ## --------------------------------------------------------
    ## 7. EXECUTION LEDGER REPORT COMPILATION
    ## --------------------------------------------------------
    - name: Compile and Output Analytical Verification Report
      ansible.builtin.debug:
        msg:
          - "=================================================================="
          - "      RED HAT ANSIBLE AUTOMATION PLATFORM RECONCILIATION REPORT   "
          - "=================================================================="
          - "               PART A: INSTALLED INFRASTRUCTURE IDENTITIES        "
          - "------------------------------------------------------------------"
          - "Node FQDN Hostname          : {{ ansible_fqdn }}"
          - "Active Host Network IP     : {{ ansible_default_ipv4.address | default('N/A') }}"
          - "Host OS Platform Target    : RHEL {{ ansible_distribution_version }}"
          - "Automation Controller Pack : {{ controller_version }}"
          - "Automation Hub Engine Pack : {{ hub_version }}"
          - "Event-Driven Ansible Pack  : {{ eda_version }}"
          - "Insights Client Connection : {{ insights_status_text }}"
          - "RHC Infrastructure Routing : {{ rhc_status_text }}"
          - "------------------------------------------------------------------"
          - "               PART B: DETECTED PLATFORM RISK & VULNERABILITIES   "
          - "------------------------------------------------------------------"
          - "Pending Security Updates Summary Metric:"
          - "{{ dnf_security_summary_text }}"
          - "------------------------------------------------------------------"
          - "Intercepted Active System CVE Vectors:"
          - "{{ dnf_cve_text | default('None Encountered') }}"
          - "------------------------------------------------------------------"
          - "               PART C: EXECUTED ENGINE SYSTEM CHANGES             "
          - "------------------------------------------------------------------"
          - "System Open File Tuning Limits: {{ file_limits_status }}"
          - "Transparent Hugepage Handling : {{ thp_status }}"
          - "Kernel Memory Overcommit Tweak: {{ sysctl_status }}"
          - "Active Tuned Kernel Profile   : {{ tuned_status }}"
          - "------------------------------------------------------------------"
          - "               PART D: LOW-LEVEL OPERATIONAL METRICS              "
          - "------------------------------------------------------------------"
          - "Chrony Precision Clock Tracking: {{ chrony_text }}"
          - "Partition Mount Integrity Check: {{ ro_mounts_text }}"
          - "Datastore Write Throughput IO  : {{ raw_io_text }}"
          - "=================================================================="
      tags: [report]

    - name: Archive report to local log for auditing
      ansible.builtin.copy:
        dest: /var/log/aap_healthcheck/report-{{ inventory_hostname }}.log
        content: "Report generated by aap_production_orchestrator.yml on {{ ansible_date_time.iso8601 }}\n"
        owner: root
        group: root
        mode: '0644'
      when: ansible_facts is defined
      tags: [report]
