---
- name: Prompt and generate group_vars/all.yml
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    project_root: "{{ playbook_dir | dirname }}"

  vars_prompt:
    - name: output_file
      prompt: "Output file path"
      private: false
      default: "group_vars/all.yml"

    - name: overwrite_existing
      prompt: "Overwrite output file if it exists? (true/false)"
      private: false
      default: "false"

    - name: old_rpm_host
      prompt: "Old AAP 2.5 RPM host"
      private: false
      default: "old-aap-25.example.com"

    - name: new_container_host
      prompt: "New AAP 2.6 containerized host"
      private: false
      default: "new-aap.example.com"

    - name: old_installer_dir
      prompt: "Old installer directory"
      private: false
      default: "/opt/ansible-automation-platform/installer"

    - name: new_installer_dir
      prompt: "New installer directory"
      private: false
      default: "/opt/ansible-automation-platform/installer"

    - name: deployment_type
      prompt: "Deployment type (single_node/growth)"
      private: false
      default: "single_node"

    - name: controller_username
      prompt: "Controller admin username"
      private: false
      default: "admin"

    - name: validate_certs
      prompt: "Validate TLS certs for API checks (true/false)"
      private: false
      default: "false"

    - name: run_preflight
      prompt: "Run preflight checks by default (true/false)"
      private: false
      default: "true"

    - name: dry_run
      prompt: "Enable dry run by default (true/false)"
      private: false
      default: "true"

    - name: bundle_install
      prompt: "Bundle install enabled (true/false)"
      private: false
      default: "true"

    - name: bundle_dir
      prompt: "Bundle directory"
      private: false
      default: "{{ '{{' }} lookup('ansible.builtin.env', 'PWD') {{ '}}' }}/bundle"

    - name: registry_url
      prompt: "Registry URL"
      private: false
      default: "registry.redhat.io"

    - name: external_db_host
      prompt: "External DB host (used for growth topology)"
      private: false
      default: "externaldb.example.org"

  tasks:
    - name: Validate deployment type
      ansible.builtin.assert:
        that:
          - deployment_type in ['single_node', 'growth']
        fail_msg: "deployment_type must be 'single_node' or 'growth'"

    - name: Resolve output path
      ansible.builtin.set_fact:
        resolved_output_file: >-
          {{ output_file if (output_file | regex_search('^/')) else (project_root ~ '/' ~ output_file) }}

    - name: Validate boolean-like prompts
      ansible.builtin.assert:
        that:
          - (overwrite_existing | lower) in ['true', 'false']
          - (validate_certs | lower) in ['true', 'false']
          - (run_preflight | lower) in ['true', 'false']
          - (dry_run | lower) in ['true', 'false']
          - (bundle_install | lower) in ['true', 'false']
        fail_msg: "Boolean prompts must be true or false"

    - name: Check if output file exists
      ansible.builtin.stat:
        path: "{{ resolved_output_file }}"
      register: output_file_stat

    - name: Stop if output exists and overwrite is false
      ansible.builtin.fail:
        msg: "{{ resolved_output_file }} already exists. Re-run and set overwrite_existing=true."
      when:
        - output_file_stat.stat.exists
        - not (overwrite_existing | bool)

    - name: Ensure destination directory exists
      ansible.builtin.file:
        path: "{{ resolved_output_file | dirname }}"
        state: directory
        mode: "0755"

    - name: Render group_vars/all.yml
      ansible.builtin.template:
        src: templates/group_vars_all.yml.j2
        dest: "{{ resolved_output_file }}"
        mode: "0640"

    - name: Show completion message
      ansible.builtin.debug:
        msg:
          - "Generated {{ resolved_output_file }}"
          - "Next: create and encrypt group_vars/vault.yml with your secrets."
