---
- name: Prompt and generate group_vars/vault.yml
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    project_root: "{{ playbook_dir | dirname }}"

  vars_prompt:
    - name: output_file
      prompt: "Output file path"
      private: false
      default: "group_vars/vault.yml"

    - name: overwrite_existing
      prompt: "Overwrite output file if it exists? (true/false)"
      private: false
      default: "false"

    - name: vault_controller_admin_password
      prompt: "Controller admin password"
      private: true

    - name: vault_postgresql_admin_password
      prompt: "PostgreSQL admin password"
      private: true

    - name: vault_registry_user
      prompt: "Registry username"
      private: false

    - name: vault_registry_password
      prompt: "Registry password"
      private: true

    - name: vault_gateway_admin_password
      prompt: "Gateway admin password"
      private: true

    - name: vault_hub_admin_password
      prompt: "Hub admin password"
      private: true

    - name: vault_eda_admin_password
      prompt: "EDA admin password"
      private: true

    - name: vault_gateway_pg_username
      prompt: "Gateway DB username"
      private: false

    - name: vault_gateway_pg_password
      prompt: "Gateway DB password"
      private: true

    - name: vault_controller_pg_username
      prompt: "Controller DB username"
      private: false

    - name: vault_controller_pg_password
      prompt: "Controller DB password"
      private: true

    - name: vault_hub_pg_username
      prompt: "Hub DB username"
      private: false

    - name: vault_hub_pg_password
      prompt: "Hub DB password"
      private: true

    - name: vault_eda_pg_username
      prompt: "EDA DB username"
      private: false

    - name: vault_eda_pg_password
      prompt: "EDA DB password"
      private: true

  tasks:
    - name: Validate overwrite flag
      ansible.builtin.assert:
        that:
          - (overwrite_existing | lower) in ['true', 'false']
        fail_msg: "overwrite_existing must be true or false"

    - name: Resolve output path
      ansible.builtin.set_fact:
        resolved_output_file: >-
          {{ output_file if (output_file | regex_search('^/')) else (project_root ~ '/' ~ output_file) }}

    - name: Check if output file exists
      ansible.builtin.stat:
        path: "{{ resolved_output_file }}"
      register: output_file_stat

    - name: Stop if output exists and overwrite is false
      ansible.builtin.fail:
        msg: "{{ resolved_output_file }} already exists. Re-run and set overwrite_existing=true."
      when:
        - output_file_stat.stat.exists
        - not (overwrite_existing | bool)

    - name: Ensure destination directory exists
      ansible.builtin.file:
        path: "{{ resolved_output_file | dirname }}"
        state: directory
        mode: "0755"

    - name: Render group_vars/vault.yml
      ansible.builtin.template:
        src: templates/group_vars_vault.yml.j2
        dest: "{{ resolved_output_file }}"
        mode: "0600"

    - name: Show completion message
      ansible.builtin.debug:
        msg:
          - "Generated {{ resolved_output_file }}"
          - "Encrypt with: ansible-vault encrypt {{ resolved_output_file }}"
