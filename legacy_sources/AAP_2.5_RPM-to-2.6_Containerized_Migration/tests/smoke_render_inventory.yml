---
- name: Smoke test inventory rendering for both topologies
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Ensure smoke output directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/output"
        state: directory
        mode: "0755"

    - name: Render single-node inventory
      ansible.builtin.template:
        src: ../roles/aap_25_to_26_migration/templates/inventory.j2
        dest: "{{ playbook_dir }}/output/inventory-single.ini"
        mode: "0644"
      vars:
        aap_25_to_26_migration_new_container_host: aap.example.org
        aap_25_to_26_migration_single_node_host: aap.example.org
        aap_25_to_26_migration_postgresql_admin_username: postgres
        aap_25_to_26_migration_postgresql_admin_password: test
        aap_25_to_26_migration_bundle_install: true
        aap_25_to_26_migration_bundle_dir: /opt/aap/bundle
        aap_25_to_26_migration_registry_url: registry.redhat.io
        aap_25_to_26_migration_registry_username: user
        aap_25_to_26_migration_registry_password: pass
        aap_25_to_26_migration_redis_mode: standalone
        aap_25_to_26_migration_gateway_admin_password: test
        aap_25_to_26_migration_gateway_pg_password: test
        aap_25_to_26_migration_controller_admin_password: test
        aap_25_to_26_migration_controller_pg_password: test
        aap_25_to_26_migration_controller_percent_memory_capacity: 0.5
        aap_25_to_26_migration_hub_admin_password: test
        aap_25_to_26_migration_hub_pg_password: test
        aap_25_to_26_migration_hub_seed_collections: false
        aap_25_to_26_migration_eda_admin_password: test
        aap_25_to_26_migration_eda_pg_password: test

    - name: Render growth inventory
      ansible.builtin.template:
        src: ../roles/aap_25_to_26_migration/templates/inventory-growth.j2
        dest: "{{ playbook_dir }}/output/inventory-growth.ini"
        mode: "0644"
      vars:
        aap_25_to_26_migration_new_container_host: aap.example.org
        aap_25_to_26_migration_postgresql_admin_username: postgres
        aap_25_to_26_migration_postgresql_admin_password: test
        aap_25_to_26_migration_bundle_install: true
        aap_25_to_26_migration_bundle_dir: /opt/aap/bundle
        aap_25_to_26_migration_registry_url: registry.redhat.io
        aap_25_to_26_migration_registry_username: user
        aap_25_to_26_migration_registry_password: pass
        aap_25_to_26_migration_gateway_admin_password: test
        aap_25_to_26_migration_gateway_pg_host: db.example.org
        aap_25_to_26_migration_gateway_pg_database: gateway
        aap_25_to_26_migration_gateway_pg_username: gateway
        aap_25_to_26_migration_gateway_pg_password: test
        aap_25_to_26_migration_controller_admin_password: test
        aap_25_to_26_migration_controller_pg_host: db.example.org
        aap_25_to_26_migration_controller_pg_database: controller
        aap_25_to_26_migration_controller_pg_username: controller
        aap_25_to_26_migration_controller_pg_password: test
        aap_25_to_26_migration_hub_admin_password: test
        aap_25_to_26_migration_hub_pg_host: db.example.org
        aap_25_to_26_migration_hub_pg_database: hub
        aap_25_to_26_migration_hub_pg_username: hub
        aap_25_to_26_migration_hub_pg_password: test
        aap_25_to_26_migration_eda_admin_password: test
        aap_25_to_26_migration_eda_pg_host: db.example.org
        aap_25_to_26_migration_eda_pg_database: eda
        aap_25_to_26_migration_eda_pg_username: eda
        aap_25_to_26_migration_eda_pg_password: test

    - name: Assert rendered files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ playbook_dir }}/output/inventory-single.ini"
        - "{{ playbook_dir }}/output/inventory-growth.ini"
      register: aap_25_to_26_migration_smoke_stats

    - name: Assert both inventories rendered
      ansible.builtin.assert:
        that:
          - aap_25_to_26_migration_smoke_stats.results[0].stat.exists
          - aap_25_to_26_migration_smoke_stats.results[1].stat.exists
        fail_msg: "Inventory smoke render failed"
