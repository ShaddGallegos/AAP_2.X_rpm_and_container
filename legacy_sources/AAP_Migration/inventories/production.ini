# Example inventory for AAP migration
# Replace hostnames/IPs and groups as appropriate.

[aap_primary]
aap-controller-1 ansible_host=192.0.2.10

[aap_nodes]
aap-controller-1

# Optional groups if you run external services
[aap_gateway]
aap-gateway-1 ansible_host=192.0.2.11

[aap_hub]
aap-hub-1 ansible_host=192.0.2.12

[aap_db]
aap-db-1 ansible_host=192.0.2.13

[all:vars]
ansible_user=ec2-user
ansible_become=true
