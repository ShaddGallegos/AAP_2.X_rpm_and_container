---
- name: Check key ports are reachable (from the node itself)
  ansible.builtin.wait_for:
    host: "{{ item.host }}"
    port: "{{ item.port }}"
    timeout: 5
  loop: "{{ check_ports }}"
  register: _port_checks
  failed_when: false

- name: Capture service status (best-effort)
  ansible.builtin.shell: |
    set -o pipefail
    if command -v automation-controller-service >/dev/null 2>&1; then
      automation-controller-service status || true
    fi
    if command -v automation-gateway-service >/dev/null 2>&1; then
      automation-gateway-service status || true
    fi
    systemctl --no-pager --full status automation-controller 2>/dev/null || true
    systemctl --no-pager --full status automation-gateway 2>/dev/null || true
    systemctl --no-pager --full status nginx 2>/dev/null || true
  args:
    executable: /bin/bash
  register: _svc_status
  changed_when: false

- name: Validate Controller API ping (optional)
  when:
    - validate_controller_api | bool
    - aap_controller_url is defined
    - aap_api_token is defined
  ansible.builtin.uri:
    url: "{{ aap_controller_url }}/api/v2/ping/"
    method: GET
    headers:
      Authorization: "Bearer {{ aap_api_token }}"
    validate_certs: "{{ validate_tls }}"
    return_content: true
    status_code: [200]
  delegate_to: localhost
  register: _controller_ping

- name: Validate Hub API (optional)
  when:
    - validate_hub_api | bool
    - aap_hub_url is defined
    - aap_api_token is defined
  ansible.builtin.uri:
    url: "{{ aap_hub_url }}/api/galaxy/v3/"
    method: GET
    headers:
      Authorization: "Bearer {{ aap_api_token }}"
    validate_certs: "{{ validate_tls }}"
    return_content: true
    status_code: [200, 401]
  delegate_to: localhost
  register: _hub_check

- name: Record validation facts
  ansible.builtin.set_fact:
    aap_validation:
      ports: "{{ _port_checks.results | default([]) }}"
      service_status: "{{ _svc_status.stdout | default('') }}"
      controller_ping_ok: "{{ (_controller_ping.status | default(0)) == 200 if (_controller_ping is defined) else 'skipped' }}"
