---
# Installer directory (must contain setup.sh)
aap_installer_dir: ""
aap_installer_inventory: "inventory"

# Optional installer command path. If empty, defaults to <aap_installer_dir>/setup.sh
aap_installer_command: ""

# Extra args to pass to setup.sh (string)
aap_setup_extra_args: ""

# Stage label for idempotency marker
stage_label: "stage"

# Marker file to prevent accidental re-runs
stage_marker_dir: /var/tmp
