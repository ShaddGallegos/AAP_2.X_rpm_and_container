---
- name: Validate AAP backup inputs
  ansible.builtin.assert:
    that:
      - aap_installer_dir | length > 0
    fail_msg: "aap_installer_dir must be set (see group_vars/all.yml.example)"

- name: Resolve backup command path
  ansible.builtin.set_fact:
    _aap_backup_command: "{{ aap_backup_command | default('') | trim if (aap_backup_command is defined) else '' }}"

- name: Default backup command path to setup.sh
  ansible.builtin.set_fact:
    _aap_backup_command: "{{ aap_installer_dir }}/setup.sh"
  when: _aap_backup_command | length == 0

- name: Check backup command exists
  ansible.builtin.stat:
    path: "{{ _aap_backup_command }}"
  register: _backup_cmd

- name: Fail if backup command is missing
  ansible.builtin.fail:
    msg: "Backup command not found at {{ _aap_backup_command }}"
  when: not _backup_cmd.stat.exists

- name: Ensure remote backup directory exists
  ansible.builtin.file:
    path: "{{ backup_dir_remote }}"
    state: directory
    mode: '0750'

- name: Run AAP backup via installer (setup.sh -b)
  ansible.builtin.command: >-
    {{ _aap_backup_command }}
    -b
    -i {{ aap_installer_dir }}/{{ aap_installer_inventory }}
    --backup-dir {{ backup_dir_remote }}
  register: _backup_run
  changed_when: true

- name: List backup artifacts
  ansible.builtin.shell: "ls -1 {{ backup_dir_remote }} | tail -n +1"
  register: _backup_ls
  changed_when: false

- name: Ensure local artifact directory exists
  ansible.builtin.file:
    path: "{{ artifact_dir_local }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true

- name: Write backup summary (local)
  ansible.builtin.copy:
    dest: "{{ artifact_dir_local }}/backup_{{ backup_label | default('stage') }}_{{ inventory_hostname }}.txt"
    content: |
      Host: {{ inventory_hostname }}
      Label: {{ backup_label }}
      Backup dir (remote): {{ backup_dir_remote }}
      Contents:
      {{ _backup_ls.stdout }}
  delegate_to: localhost
