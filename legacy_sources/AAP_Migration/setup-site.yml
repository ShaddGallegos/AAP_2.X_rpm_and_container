---
# Top-level orchestrator to run the full AAP_Migration project
# Usage:
#   ansible-playbook setup-site.yml
# Optional:
#   ansible-playbook setup-site.yml -e @playbooks/preflight.vars.yml

- name: Bootstrap ansible.cfg from template (optional)
  import_playbook: playbooks/generate_ansible_cfg.yml

- name: Preflight connectivity/DNS/SSH trust
  import_playbook: playbooks/03_preflight_connectivity.yml

- name: Full migration pipeline (2.4 -> 2.5 -> 2.6)
  import_playbook: playbooks/migrate_24_25_26.yml