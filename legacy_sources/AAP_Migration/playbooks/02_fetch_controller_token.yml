---
- name: Derive Controller API token if missing
  hosts: localhost
  gather_facts: false
  vars:
    # scope can be "read" or "write"
    controller_token_scope: "write"
  tasks:
    - name: Assert controller URL and credentials exist
      ansible.builtin.assert:
        that:
          - aap_controller_url is defined
          - aap_controller_url | length > 0
          - (admin_user | default(common.admin_user | default(''))) | length > 0
          - (admin_password | default(common.admin_user_password | default(''))) | length > 0
        fail_msg: "aap_controller_url, admin_user, and admin_password must be set"

    - name: Skip if token already provided
      ansible.builtin.debug:
        msg: "aap_api_token already set; skipping token creation"
      when: aap_api_token is defined and (aap_api_token | length) > 0

    - name: Create API token via Controller (POST /api/v2/tokens/)
      when: aap_api_token is not defined or (aap_api_token | length) == 0
      ansible.builtin.uri:
        url: "{{ aap_controller_url }}/api/v2/tokens/"
        method: POST
        user: "{{ admin_user | default(common.admin_user | default('admin')) }}"
        password: "{{ admin_password | default(common.admin_user_password | default('')) }}"
        force_basic_auth: true
        body_format: json
        body:
          description: "AAP Migration token"
          scope: "{{ controller_token_scope }}"
        status_code: [201]
        validate_certs: "{{ validate_tls | default(false) }}"
        return_content: true
      register: _token_create
      no_log: true

    - name: Set aap_api_token fact
      when:
        - _token_create is defined
        - _token_create.json is defined
        - _token_create.json.token is defined
      ansible.builtin.set_fact:
        aap_api_token: "{{ _token_create.json.token }}"
      no_log: true

    - name: Show token acquisition result
      ansible.builtin.debug:
        msg: >-
          {% if aap_api_token is defined and (aap_api_token | length) > 0 %}
          Controller token acquired and stored in memory for this run.
          {% else %}
          Token not created; ensure aap_api_token is set via Vault or vars.
          {% endif %}
      no_log: true