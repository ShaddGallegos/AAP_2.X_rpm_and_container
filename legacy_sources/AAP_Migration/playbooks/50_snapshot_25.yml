---
- name: Snapshot VMware after reaching AAP 2.5 (pre-2.6)
  hosts: localhost
  gather_facts: false
  vars:
    snapshot_label: "PRE_2.6_FROM_2.5"
  roles:
    - role: vmware_snapshot

  tasks:
    - name: Save snapshot name locally for later rollback
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../reports/last_snapshot_pre_26.txt"
        content: "{{ vmware_snapshot_name }}\n"
      delegate_to: localhost
      run_once: true
