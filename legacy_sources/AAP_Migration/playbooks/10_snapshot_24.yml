---
- name: Snapshot VMware before AAP 2.4 changes
  hosts: localhost
  gather_facts: false
  vars:
    snapshot_label: "PRE_2.4"
  roles:
    - role: vmware_snapshot

  tasks:
    - name: Save snapshot name locally for later rollback
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../reports/last_snapshot_pre_24.txt"
        content: "{{ vmware_snapshot_name }}\n"
      delegate_to: localhost
      run_once: true
