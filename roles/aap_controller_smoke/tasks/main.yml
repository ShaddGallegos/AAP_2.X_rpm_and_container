---
- name: Ensure local report dir exists
  ansible.builtin.file:
    path: "{{ artifact_dir_local }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true

- name: Require Controller URL and API token
  ansible.builtin.assert:
    that:
      - aap_controller_url | length > 0
      - aap_api_token | length > 0
    fail_msg: "Set aap_controller_url and aap_api_token (store token in Vault)."

- name: Controller API ping
  ansible.builtin.uri:
    url: "{{ aap_controller_url }}/api/v2/ping/"
    method: GET
    headers:
      Authorization: "Bearer {{ aap_api_token }}"
    validate_certs: "{{ validate_tls }}"
    return_content: true
    status_code: [200]
  delegate_to: localhost
  register: _ping

- name: List orgs (basic functional read)
  ansible.builtin.uri:
    url: "{{ aap_controller_url }}/api/v2/organizations/?page_size=1"
    method: GET
    headers:
      Authorization: "Bearer {{ aap_api_token }}"
    validate_certs: "{{ validate_tls }}"
    return_content: true
    status_code: [200]
  delegate_to: localhost
  register: _orgs

- name: Launch smoke Job Template (optional)
  when: smoke_job_template_id | string | length > 0
  ansible.builtin.uri:
    url: "{{ aap_controller_url }}/api/v2/job_templates/{{ smoke_job_template_id }}/launch/"
    method: POST
    headers:
      Authorization: "Bearer {{ aap_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body: {}
    validate_certs: "{{ validate_tls }}"
    return_content: true
    status_code: [201, 202]
  delegate_to: localhost
  register: _launch

- name: Set launched job id
  when: _launch is defined
  ansible.builtin.set_fact:
    _smoke_job_id: "{{ _launch.json.id | default(_launch.json.job) }}"

- name: Poll job until completion
  when: _smoke_job_id is defined
  ansible.builtin.uri:
    url: "{{ aap_controller_url }}/api/v2/jobs/{{ _smoke_job_id }}/"
    method: GET
    headers:
      Authorization: "Bearer {{ aap_api_token }}"
    validate_certs: "{{ validate_tls }}"
    return_content: true
    status_code: [200]
  delegate_to: localhost
  register: _job
  until: _job.json.status in ['successful', 'failed', 'error', 'canceled']
  retries: "{{ smoke_poll_retries }}"
  delay: "{{ smoke_poll_delay }}"

- name: Fetch job stdout (txt)
  when: _smoke_job_id is defined
  ansible.builtin.uri:
    url: "{{ aap_controller_url }}/api/v2/jobs/{{ _smoke_job_id }}/stdout/?format=txt"
    method: GET
    headers:
      Authorization: "Bearer {{ aap_api_token }}"
    validate_certs: "{{ validate_tls }}"
    return_content: true
    status_code: [200]
  delegate_to: localhost
  register: _stdout

- name: Write smoke test report (local)
  ansible.builtin.copy:
    dest: "{{ artifact_dir_local }}/{{ lookup('pipe','date +%Y%m%d_%H%M%S') }}_{{ smoke_stage_label }}_controller_smoketest.md"
    content: |
      # Controller Functional Smoke Test — {{ smoke_stage_label }}

      Generated: {{ lookup('pipe','date -u +%Y-%m-%dT%H:%M:%SZ') }}

      ## API Connectivity

      - ping: OK
      - organizations endpoint: OK (count field present: {{ 'count' in (_orgs.json | default({})) }})

      ## Job Template Launch

      {% if _smoke_job_id is defined %}
      - job_template_id: {{ smoke_job_template_id }}
      - job_id: {{ _smoke_job_id }}
      - final_status: {{ _job.json.status | default('unknown') }}

      ### Stdout (truncated)

      ```text
      {{ (_stdout.content | default(''))[:8000] }}
      ```
      {% else %}
      - job_template_id: (not provided)
      - launch: skipped

      > To enable a “real run” smoke test, set `smoke_job_template_id` to an existing Job Template ID that is safe to run.
      {% endif %}

- name: Fail if job did not succeed
  when: _smoke_job_id is defined
  ansible.builtin.fail:
    msg: "Smoke test job {{ _smoke_job_id }} ended with status {{ _job.json.status }}"
  when: _job.json.status != 'successful'
