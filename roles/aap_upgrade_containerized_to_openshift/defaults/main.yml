---
# OpenShift precheck settings
openshift_precheck_enabled: true
openshift_project: "aap"
openshift_check_namespace: false
openshift_require_login: false

# Optional explicit kubeconfig/context used by oc commands
openshift_kubeconfig: ""
openshift_context: ""

# Optional API login values (used only when openshift_require_login=true)
openshift_api_url: ""
openshift_api_token: "{{ vault_openshift_api_token | default('') }}"
openshift_validate_tls: true

# Controls whether the role runs post-upgrade validation role
run_post_upgrade_validation: true