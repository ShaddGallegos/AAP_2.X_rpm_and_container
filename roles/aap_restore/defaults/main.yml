---
backup_dir_remote: /var/tmp/aap_migration_backups

# Installer directory for restore (must contain setup.sh)
aap_installer_dir: ""
aap_installer_inventory: "inventory"

# Optional restore command path. If empty, defaults to <aap_installer_dir>/setup.sh
aap_restore_command: ""

# The backup file/dir to restore from (remote path)
aap_restore_from: ""
