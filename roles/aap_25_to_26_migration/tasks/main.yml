---
- name: Validate required role inputs
  ansible.builtin.assert:
    that:
      - aap_25_to_26_migration_old_rpm_host | length > 0
      - aap_25_to_26_migration_new_container_host | length > 0
      - aap_25_to_26_migration_old_installer_dir | length > 0
      - aap_25_to_26_migration_new_installer_dir | length > 0
      - aap_25_to_26_migration_controller_username | length > 0
      - aap_25_to_26_migration_controller_password | length > 0
      - aap_25_to_26_migration_deployment_type in ['single_node', 'growth']
    fail_msg: "Missing required migration variables. Check role defaults/overrides."

- name: Run role preflight checks
  ansible.builtin.include_tasks: preflight.yml
  when: aap_25_to_26_migration_run_preflight | bool

- name: Show dry-run summary
  ansible.builtin.debug:
    msg:
      - "Dry-run enabled: destructive migration actions will be skipped."
      - "Inventory rendering and preflight checks still run."
  when: aap_25_to_26_migration_dry_run | bool

- name: Ensure local workspace directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0750'
  loop:
    - "{{ aap_25_to_26_migration_export_dir }}"
    - "{{ aap_25_to_26_migration_backup_local_dir }}"

- name: Backup old AAP 2.5 RPM
  ansible.builtin.command:
    cmd: ./setup.sh -b
    chdir: "{{ aap_25_to_26_migration_old_installer_dir }}"
  delegate_to: "{{ aap_25_to_26_migration_old_rpm_host }}"
  become: true
  changed_when: true
  when:
    - aap_25_to_26_migration_backup_old_rpm | bool
    - not (aap_25_to_26_migration_dry_run | bool)

- name: Find generated backup artifacts on old host
  ansible.builtin.find:
    paths: "{{ aap_25_to_26_migration_old_installer_dir }}"
    patterns: "*.tar.gz"
    recurse: true
  register: aap_25_to_26_migration_backup_files
  delegate_to: "{{ aap_25_to_26_migration_old_rpm_host }}"
  when:
    - aap_25_to_26_migration_backup_old_rpm | bool
    - not (aap_25_to_26_migration_dry_run | bool)

- name: Capture most recent backup artifact path
  ansible.builtin.set_fact:
    aap_25_to_26_migration_latest_backup_remote: "{{ (aap_25_to_26_migration_backup_files.files | sort(attribute='mtime', reverse=true) | first).path }}"
  when:
    - aap_25_to_26_migration_backup_old_rpm | bool
    - not (aap_25_to_26_migration_dry_run | bool)
    - aap_25_to_26_migration_backup_files.matched | int > 0

- name: Fetch latest backup artifact locally
  ansible.builtin.fetch:
    src: "{{ aap_25_to_26_migration_latest_backup_remote }}"
    dest: "{{ aap_25_to_26_migration_backup_local_dir }}/"
    flat: false
  delegate_to: "{{ aap_25_to_26_migration_old_rpm_host }}"
  when:
    - aap_25_to_26_migration_backup_old_rpm | bool
    - aap_25_to_26_migration_fetch_backup_artifact | bool
    - not (aap_25_to_26_migration_dry_run | bool)
    - aap_25_to_26_migration_latest_backup_remote is defined

- name: Export old controller configuration
  ansible.builtin.include_role:
    name: infra.controller_configuration.dispatch
  vars:
    controller_hostname: "https://{{ aap_25_to_26_migration_old_rpm_host }}"
    controller_username: "{{ aap_25_to_26_migration_controller_username }}"
    controller_password: "{{ aap_25_to_26_migration_controller_password }}"
    controller_validate_certs: "{{ aap_25_to_26_migration_validate_certs }}"
    output_path: "{{ aap_25_to_26_migration_export_dir }}"
  when:
    - aap_25_to_26_migration_export_old_config | bool
    - not (aap_25_to_26_migration_dry_run | bool)

- name: Render AAP 2.6 installer inventory
  ansible.builtin.template:
    src: "{{ 'inventory-growth.j2' if aap_25_to_26_migration_deployment_type == 'growth' else 'inventory.j2' }}"
    dest: "{{ aap_25_to_26_migration_rendered_inventory_path }}"
    mode: '0640'

- name: Copy rendered inventory to new AAP host
  ansible.builtin.copy:
    src: "{{ aap_25_to_26_migration_rendered_inventory_path }}"
    dest: "{{ aap_25_to_26_migration_inventory_remote_path }}"
    mode: '0640'
  delegate_to: "{{ aap_25_to_26_migration_new_container_host }}"
  become: true

- name: Run AAP 2.6 containerized installer
  ansible.builtin.command:
    cmd: ./setup.sh -i inventory
    chdir: "{{ aap_25_to_26_migration_new_installer_dir }}"
  delegate_to: "{{ aap_25_to_26_migration_new_container_host }}"
  become: true
  async: "{{ aap_25_to_26_migration_installer_async_timeout }}"
  poll: "{{ aap_25_to_26_migration_installer_poll_seconds }}"
  changed_when: true
  when:
    - aap_25_to_26_migration_run_installer | bool
    - not (aap_25_to_26_migration_dry_run | bool)

- name: Wait for Gateway health endpoint
  ansible.builtin.uri:
    url: "https://{{ aap_25_to_26_migration_new_container_host }}{{ aap_25_to_26_migration_gateway_health_path }}"
    method: GET
    validate_certs: "{{ aap_25_to_26_migration_validate_certs }}"
    status_code: 200
  register: aap_25_to_26_migration_gateway_health
  retries: "{{ aap_25_to_26_migration_gateway_retries }}"
  delay: "{{ aap_25_to_26_migration_gateway_delay }}"
  until: aap_25_to_26_migration_gateway_health.status == 200
  when:
    - aap_25_to_26_migration_wait_for_gateway | bool
    - aap_25_to_26_migration_run_installer | bool
    - not (aap_25_to_26_migration_dry_run | bool)

- name: Import configuration into new controller
  ansible.builtin.include_role:
    name: infra.controller_configuration.dispatch
  vars:
    controller_hostname: "https://{{ aap_25_to_26_migration_new_container_host }}"
    controller_username: "{{ aap_25_to_26_migration_controller_username }}"
    controller_password: "{{ aap_25_to_26_migration_controller_password }}"
    controller_validate_certs: "{{ aap_25_to_26_migration_validate_certs }}"
    input_path: "{{ aap_25_to_26_migration_export_dir }}"
    controller_configuration_dispatcher_roles: "{{ aap_25_to_26_migration_dispatch_roles }}"
  when:
    - aap_25_to_26_migration_import_new_config | bool
    - not (aap_25_to_26_migration_dry_run | bool)

- name: Run post-migration validation tasks
  ansible.builtin.include_tasks: validate.yml
  when:
    - aap_25_to_26_migration_verify_after_install | bool
    - not (aap_25_to_26_migration_dry_run | bool)
