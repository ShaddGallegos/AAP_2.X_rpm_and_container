---
- name: Assert base inventory groups exist
  ansible.builtin.assert:
    that:
      - groups.get('aap_primary', []) | length > 0
      - groups.get('aap_nodes', []) | length > 0
    fail_msg: "Inventory must define [aap_primary] and [aap_nodes] with at least one host."

- name: Assert AAP installer inputs for 2.5 (bridge)
  ansible.builtin.assert:
    that:
      - aap25_installer_dir is defined
      - aap25_installer_dir | length > 0
      - aap25_installer_inventory is defined
      - aap25_installer_inventory | length > 0
    fail_msg: "Set aap25_installer_dir and aap25_installer_inventory in group_vars/all.yml."

- name: Assert Controller URL present (for validations/smoke)
  ansible.builtin.assert:
    that:
      - aap_controller_url is defined
      - aap_controller_url | length > 0
    fail_msg: "Set aap_controller_url in group_vars/all.yml."

- name: Hint when token missing
  ansible.builtin.debug:
    msg: "aap_api_token not set; will rely on 02_fetch_controller_token.yml to derive it."
  when: aap_api_token is not defined or (aap_api_token | length) == 0

- name: Check target OS family (RHEL 9/10 expected)
  ansible.builtin.debug:
    msg: "Target {{ inventory_hostname }} ansible_os_family={{ ansible_os_family }} ansible_distribution_major_version={{ ansible_distribution_major_version }}"
  when: ansible_os_family is defined