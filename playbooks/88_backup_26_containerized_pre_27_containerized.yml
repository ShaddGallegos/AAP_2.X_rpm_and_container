---
- name: Backup AAP 2.6 containerized before 2.7 containerized migration + sosreport
  hosts: aap_nodes
  gather_facts: true
  vars:
    backup_label: "2.6_containerized_pre_2.7_containerized"
    aap_installer_dir: "{{ aap26_installer_dir }}"
    aap_installer_inventory: "{{ aap26_installer_inventory_containerized }}"

  roles:
    - role: sos_report
      vars:
        sos_extra_args: "--all-logs"

    - role: aap_backup