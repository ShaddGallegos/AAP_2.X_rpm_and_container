---
- name: Preflight DNS, connectivity, and SSH trust for AAP nodes
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_ssh_user: "{{ lookup('env', 'AAP_SSH_USER') | default('ansible') }}"
    fix_known_hosts: "{{ fix_known_hosts | default(false) }}"

    # Derive hostnames from URLs if no explicit override provided
    _controller_host: "{{ (aap_controller_url | default('') | regex_replace('^https?://', '')).split('/')[0] }}"
    _gateway_host: "{{ (aap_gateway_url    | default('') | regex_replace('^https?://', '')).split('/')[0] }}"
    _hub_host:      "{{ (aap_hub_url        | default('') | regex_replace('^https?://', '')).split('/')[0] }}"
    _derived_nodes: "{{ [_controller_host, _gateway_host, _hub_host] | select('string') | reject('equalto', '') | list }}"

  tasks:
    - name: Normalize any provided override list
      ansible.builtin.set_fact:
        aap_nodes_override_list: "{{ aap_nodes_override | default([]) }}"

    - name: Determine if override list is present
      ansible.builtin.set_fact:
        has_override: "{{ (aap_nodes_override_list | length) > 0 }}"

    - name: Decide final host list
      ansible.builtin.set_fact:
        aap_hosts: "{{ has_override | ternary(aap_nodes_override_list, _derived_nodes) }}"

    - name: Assert we have at least one AAP host to check
      ansible.builtin.assert:
        that:
          - aap_hosts | length > 0
        fail_msg: "No AAP hosts found. Set aap_nodes_override (list) or aap_controller_url/aap_gateway_url/aap_hub_url."

    - name: Show hosts to be checked
      ansible.builtin.debug:
        var: aap_hosts

    - name: Preflight each AAP host
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/preflight_host.yml"
      loop: "{{ aap_hosts }}"
      loop_control:
        loop_var: aap_host

    # Controller API reachability checks (TLS on/off)
    - name: Normalize Controller ping URL
      ansible.builtin.set_fact:
        controller_ping_url: "{{ (aap_controller_url | default('') | regex_replace('/+$','')) }}/api/v2/ping/"

    - name: Check Controller /api/v2/ping with TLS validation enabled
      block:
        - name: GET /api/v2/ping (TLS validated)
          ansible.builtin.uri:
            url: "{{ controller_ping_url }}"
            method: GET
            status_code: 200
            return_content: true
            validate_certs: true
          register: controller_tls_on

        - name: Report TLS-validated Controller reachability
          ansible.builtin.debug:
            msg: >
              Controller /api/v2/ping OK (TLS validated, HTTP {{ controller_tls_on.status }})
              {{ 'version=' ~ (controller_tls_on.json.version | default('unknown')) if controller_tls_on.json is defined else '' }}
      rescue:
        - name: Report TLS-validated Controller reachability failure
          ansible.builtin.debug:
            msg: "Controller /api/v2/ping FAILED (TLS validated): {{ ansible_failed_result.msg | default(ansible_failed_result) }}"

    - name: Check Controller /api/v2/ping with TLS validation disabled
      block:
        - name: GET /api/v2/ping (TLS not validated)
          ansible.builtin.uri:
            url: "{{ controller_ping_url }}"
            method: GET
            status_code: 200
            return_content: true
            validate_certs: false
          register: controller_tls_off

        - name: Report non-validated Controller reachability
          ansible.builtin.debug:
            msg: >
              Controller /api/v2/ping OK (TLS not validated, HTTP {{ controller_tls_off.status }})
              {{ 'version=' ~ (controller_tls_off.json.version | default('unknown')) if controller_tls_off.json is defined else '' }}
      rescue:
        - name: Report non-validated Controller reachability failure
          ansible.builtin.debug:
            msg: "Controller /api/v2/ping FAILED (TLS not validated): {{ ansible_failed_result.msg | default(ansible_failed_result) }}"