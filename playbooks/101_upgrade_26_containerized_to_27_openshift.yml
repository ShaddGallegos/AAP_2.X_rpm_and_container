---
- name: Upgrade AAP 2.6 containerized -> 2.7 OpenShift
  hosts: aap_primary
  gather_facts: true
  vars:
    stage_label: "upgrade_26_containerized_to_27_openshift"
    stage_name: "2.7_openshift"
    aap_installer_dir: "{{ aap27_openshift_installer_dir }}"
    aap_installer_inventory: "{{ aap27_openshift_installer_inventory_containerized_to_openshift }}"
    aap_installer_command: "{{ aap27_openshift_installer_command }}"

  roles:
    - role: aap_upgrade_containerized_to_openshift
      vars:
        aap_setup_extra_args: "{{ aap27_setup_extra_args }}"

- name: Write 2.7 OpenShift report (from 2.6 containerized)
  hosts: localhost
  gather_facts: false
  vars:
    stage_name: "2.7_openshift_from_26_containerized"
    report_dir: "{{ playbook_dir }}/../reports"
    snapshot_name: "{{ lookup('file', playbook_dir + '/../reports/last_snapshot_pre_27_openshift.txt', errors='ignore') | default('') | trim }}"
  roles:
    - role: migration_report