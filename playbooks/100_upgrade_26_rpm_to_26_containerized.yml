---
- import_playbook: upgrade_aap_stage.yml
  vars:
    stage_label: "upgrade_26_rpm_to_26_containerized"
    stage_name: "2.6_containerized"
    aap_installer_dir: "{{ aap26_installer_dir }}"
    aap_installer_inventory: "{{ aap26_installer_inventory_rpm_to_containerized }}"
    upgrade_role_name: "aap_installer_run"
    aap_setup_extra_args: ""
    upgrade_validate: true
    report_stage_name: "2.6_containerized_from_26_rpm"
    report_snapshot_name: "{{ lookup('file', playbook_dir + '/../reports/last_snapshot_pre_26_containerized.txt', errors='ignore') | default('') | trim }}"