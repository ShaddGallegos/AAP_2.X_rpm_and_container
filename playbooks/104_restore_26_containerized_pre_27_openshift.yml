---
- name: Restore AAP 2.6 containerized backup (for 2.7 OpenShift migration rollback)
  hosts: aap_primary
  gather_facts: true
  vars:
    aap_installer_dir: "{{ aap26_installer_dir }}"
    aap_installer_inventory: "{{ aap26_installer_inventory_containerized }}"
    aap_restore_command: "{{ aap26_restore_command }}"
  roles:
    - role: aap_restore