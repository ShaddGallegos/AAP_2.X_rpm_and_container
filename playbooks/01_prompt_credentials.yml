---
- name: Prompt for admin credentials (CLI)
  hosts: localhost
  gather_facts: false
  vars_prompt:
    - name: admin_user
      prompt: "Admin username"
      private: no
      default: "{{ common.admin_user | default('admin') }}"
    - name: admin_password
      prompt: "Admin password"
      private: true

  tasks:
    - name: Confirm variables are set
      ansible.builtin.debug:
        msg:
          - "admin_user provided"
          - "admin_password provided"
      no_log: true