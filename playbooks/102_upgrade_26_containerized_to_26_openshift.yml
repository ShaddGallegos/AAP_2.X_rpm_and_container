---
- import_playbook: upgrade_aap_stage.yml
  vars:
    stage_label: "upgrade_26_containerized_to_26_openshift"
    stage_name: "2.6_openshift"
    aap_installer_dir: "{{ aap26_openshift_installer_dir }}"
    aap_installer_inventory: "{{ aap26_openshift_installer_inventory_containerized_to_openshift }}"
    aap_installer_command: "{{ aap26_openshift_installer_command }}"
    upgrade_role_name: "aap_upgrade_containerized_to_openshift"
    aap_setup_extra_args: ""
    upgrade_validate: false
    report_stage_name: "2.6_openshift_from_26_containerized"
    report_snapshot_name: "{{ lookup('file', playbook_dir + '/../reports/last_snapshot_pre_26_openshift.txt', errors='ignore') | default('') | trim }}"