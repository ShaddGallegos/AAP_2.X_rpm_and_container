---
# VMware (snapshot) settings
vcenter_hostname: "vcenter.example.com"
vcenter_username: "administrator@vsphere.local"
vcenter_password: "{{ vcenter_password | default(vault_vcenter_password | default('')) }}"
vcenter_validate_certs: false
vcenter_datacenter: "Datacenter"
vcenter_folder: "/"

# VMs to snapshot (names in vCenter)
vmware_vm_names:
  - "aap-controller-1"
  - "aap-gateway-1"
  - "aap-hub-1"
  - "aap-db-1"

snapshot_prefix: "AAP_MIG"

# AAP installer directories on target nodes (must contain setup.sh)
aap24_installer_dir: "/opt/aap/installer-2.4"
aap25_installer_dir: "/opt/aap/installer-2.5"
aap26_installer_dir: "/opt/aap/installer-2.6"
aap26_openshift_installer_dir: "/opt/aap/installer-2.6-openshift"
aap27_installer_dir: "/opt/aap/installer-2.7"
aap27_openshift_installer_dir: "/opt/aap/installer-2.7-openshift"

# Inventory files used by each installer (on target nodes)
aap24_installer_inventory: "inventory"
aap25_installer_inventory: "inventory"
aap26_installer_inventory: "inventory"
aap26_installer_inventory_rpm: "inventory_rpm"
aap26_installer_inventory_containerized: "inventory_containerized"
aap26_installer_inventory_rpm_to_containerized: "inventory_rpm_to_containerized"
aap26_openshift_installer_inventory_containerized_to_openshift: "inventory_containerized_to_openshift"
aap27_installer_inventory_rpm_to_containerized: "inventory_rpm_to_containerized"
aap27_installer_inventory_containerized_to_containerized: "inventory_containerized_to_containerized"
aap27_openshift_installer_inventory_containerized_to_openshift: "inventory_containerized_to_openshift"

# Optional restore command override for 2.6 rollback.
# Leave empty to use <aap26_installer_dir>/setup.sh.
aap26_restore_command: ""

# Optional installer command override for 2.6 OpenShift installs.
# Leave empty to use <aap26_openshift_installer_dir>/setup.sh.
aap26_openshift_installer_command: ""

# Optional installer command override for 2.7.
# Leave empty to use <aap27_installer_dir>/setup.sh.
aap27_installer_command: ""

# Optional installer command override for 2.7 OpenShift installs.
# Leave empty to use <aap27_openshift_installer_dir>/setup.sh.
aap27_openshift_installer_command: ""

# Optional extra args for 2.7 install command.
aap27_setup_extra_args: ""

# Optional OpenShift checks for 2.6 RPM -> 2.7 containerized role
openshift_precheck_enabled: true
openshift_project: "aap"
openshift_check_namespace: false
openshift_require_login: false
openshift_kubeconfig: ""
openshift_context: ""
openshift_api_url: ""
openshift_api_token: "{{ vault_openshift_api_token | default('') }}"
openshift_validate_tls: true

# Backup locations and local artifacts
backup_dir_remote: "/var/tmp/aap_migration_backups"
artifact_dir_local: "{{ playbook_dir }}/../reports"

# API endpoints for optional validation
aap_controller_url: "https://aap-controller-1"
aap_gateway_url: "https://aap-gateway-1"
aap_hub_url: "https://aap-hub-1"

# Auth for API checks (recommend Vault)
aap_api_token: "{{ aap_api_token | default(vault_aap_api_token | default('')) }}"
validate_tls: false

# Optional smoke test job template ID
smoke_job_template_id: ""

# SSH user for OS-level access to AAP nodes (not Controller web admin)
aap_ssh_user: "ansible"

# Optional override of nodes to preflight (FQDNs); otherwise derived from URLs above
# aap_nodes_override:
#   - "aap-controller-1.example.com"
#   - "aap-gateway-1.example.com"
#   - "aap-hub-1.example.com"